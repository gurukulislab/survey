<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GIS 2 Parent Survey</title>
<style>
body{font-family:Arial,sans-serif;max-width:700px;margin:0 auto;padding:20px;background:#faf8f4}
.card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:20px;margin:12px 0}
button{background:#d97706;color:#fff;border:none;padding:12px 20px;border-radius:8px}
input,textarea,select{width:100%;padding:10px;margin-top:8px}
</style>
</head>
<body>
<h1>J 11 – Parent Survey</h1>
<p>This starter template demonstrates section-by-section autosave.</p>
<div class="card">
<label>Biggest challenge regarding your child's education</label>
<textarea id="q1"></textarea>
</div>
<button onclick="saveSection()">Save Section</button>

<script>
const RESPONSE_ID = localStorage.getItem('gis_response_id') || crypto.randomUUID();
localStorage.setItem('gis_response_id', RESPONSE_ID);

// Replace with Apps Script URL
const API_URL = "https://script.google.com/macros/s/AKfycbzK4OeAsT1lvUnDv0BNkkXtEArALwZWbrrgvfbf2YfhvPaxzZGV9K9s7UkZlfPY-BGdjA/exec";

async function saveSection(){

 const payload = {
   responseId: RESPONSE_ID,
   section: 1,
   completed: false,
   answers: {
      q1: document.getElementById('q1').value
   }
 };

 try {

   await fetch(API_URL,{
      method:'POST',
      mode:'no-cors',
      body:JSON.stringify(payload)
   });

   alert("Sent");

 } catch(err){

   alert(err);

 }

}</script>
</body>
</html>
